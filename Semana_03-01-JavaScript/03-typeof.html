<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../common/css/estilo.css" type="text/css" rel="stylesheet" media="screen" />
    <title>JavaScript: Typeof | FCAD | UNER</title>
    <script defer>
        document.addEventListener("DOMContentLoaded", function () {
            function checkType(parametro) {
                const resultados = document.getElementById("resultados");
                if (typeof parametro === "number") {
                    resultados.innerHTML += `${parametro} es un número. <br/>`;
                    return;
                }

                if (typeof parametro === "string") {
                    resultados.innerHTML += `${parametro}  es un string. <br/>`;
                    return;
                }

                if (typeof parametro === "boolean") {
                    resultados.innerHTML += `<span style='color: blue;'>${parametro}</span> es un boolean. <br/>`;
                    return;
                }

                if (typeof parametro === "object") {
                    resultados.innerHTML += `${parametro} es un objeto. <br/>`;

                    if (parametro instanceof Array) {
                        resultados.innerHTML += `${parametro} es un array. <br/>`;
                    }
                    return;
                }

                if (typeof parametro === "undefined") {
                    resultados.innerHTML += `${parametro}  es undefined.`;
                }
            }


            let miNumero = 1;
            checkType(miNumero);

            let miString = "Esto es un string";
            checkType(miString);

            let miBoolean = true;
            checkType(miBoolean);

            let miArray = [1, 2, 3];
            checkType(miArray);

            let testUndefined = null;
            checkType(testUndefined);
        });
    </script>
</head>

<body>
    <header>
        <div class="contenedor contenedor-flex">
            <h1>Programación <span class="cuatro"></span></h1>
            <img class="logo" src="../common/img/fcad-uner-70.png" alt="Logo FCAD-UNER 70 años" />
        </div>
    </header>
    <main>
        <div class="contenedor">
            <h2>Typeof</h2>
            <div id="resultados"></div>
            <ul>
                <li><a href="index.html">Ir a inicio de JavaScript</a></li>
            </ul>
        </div>
    </main>
</body>

</html>
