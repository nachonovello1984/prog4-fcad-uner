<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="../common/css/estilo.css" type="text/css" rel="stylesheet" media="screen" />
        <title>JavaScript: Variables | FCAD | UNER</title>
        <script defer>
            document.addEventListener("DOMContentLoaded", function () {
                const resultados = document.getElementById("resultados");

                varGlobal = "Esto es una variable global";
                resultados.innerHTML += `${varGlobal}<br/>`;

                var varConVar = "Esto es una variable definida con var";
                resultados.innerHTML += `${varConVar}<br/>`;

                let varConLet = "Esto es una variable definida con let";
                resultados.innerHTML += `${varConLet}<br/>`;

                const defConstante = "Esto es una constante definida con const";
                resultados.innerHTML += `${defConstante}<br/>`;

                varConLet = "prueba";
                resultados.innerHTML += `${varConLet}<br/>`;
            });
        </script>
    </head>

    <body>
        <header>
            <div class="contenedor contenedor-flex">
                <h1>Programación <span class="cuatro"></span></h1>
                <img class="logo" src="../common/img/fcad-uner-70.png"
                    alt="Logo FCAD-UNER 70 años" />

            </div>
        </header>
        <main>
            <div class="contenedor">
                <h2>Typeof</h2>
                <div id="resultados"></div>
                <ul>
                    <li><a href="index.html">Ir a inicio de JavaScript</a></li>
                </ul>
            </div>
        </main>
    </body>
</html>
