<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../common/css/estilo.css" type="text/css" rel="stylesheet" media="screen" />
    <link href="css/estilo.css" type="text/css" rel="stylesheet" media="screen" />
    <title>Formulario Simple (Mejorado) | FCAD | UNER</title>
</head>

<body>
    <header>
        <div class="contenedor contenedor-flex">
            <h1>Programación <span class="cuatro"></span></h1>
            <img class="logo" src="../common/img/fcad-uner-70.png" alt="Logo FCAD-UNER 70 años" />

        </div>
    </header>
    <nav>
        <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="01-simple.html">Formulario Simple</a></li>
            <li><a href="02-simple-mejorado.html">Formulario Simple Mejorado</a></li>
            <li><a href="03-simple-procesamiento.html">Formulario Simple Procesamiento</a></li>
            <li><a href="04-form-historico.html">Elementos formulario HTML Histórico</a></li>
            <li><a href="05-form-html5.html">Elementos formulario HTML5</a></li>
            <li><a href="06-validacion.html">Validación en HTML5</a></li>
        </ul>
    </nav>
    <main>
        <article class="contenedor">
            <h2>Formulario Simple (Mejorado)</h2>
            <form action="02-destino.html" method="GET">
                <fieldset>
                    <legend>Datos de identificación</legend>
                    <div class="fila">
                        <label id="lblApellido" for="txtApellido">Apellido</label>

                        <input  id="txtApellido" 
                                name="apellido" 
                                type="text" 
                                size="50" 
                                maxlength="50"
                                placeholder="Escriba aquí su/s apellido/s" 
                                required 
                                autocomplete="off" 
                                autofocus />
                    </div>
                    <div class="fila">
                        <label id="lblNombre" for="txtNombre">Nombre</label>
                        <input id="txtNombre" name="nombre" type="text" size="50"
                            placeholder="Escriba aquí su/s nombre/s" required autocomplete="off" />
                    </div>
                </fieldset>
                <input type="submit" value="Enviar" />
            </form>
            <ul>
                <li><a href="index.html">Ir a inicio</a></li>
            </ul>
        </article>
    </main>
</body>

</html>
